openapi: 3.0.3
info:
  title: SaaS PH — People API
  description: |
    Modulo `people`. Expone vehiculos del conjunto y la asignacion historica
    de un vehiculo a una unidad (apartamento). Multi-tenant por subdominio /
    header `X-Tenant-Slug`; el tenant es implicito en la base.
  version: "1.0.0"

servers:
  - url: https://{slug}.dominio.com/api/v1
    variables:
      slug:
        default: conjunto
        description: Subdominio del conjunto.

tags:
  - name: vehicles
    description: Flota de vehiculos del conjunto.
  - name: assignments
    description: Asignacion historica de vehiculos a unidades.

paths:
  /vehicles:
    get:
      tags: [vehicles]
      summary: Lista vehiculos (opcional filtro por placa)
      description: |
        Requiere permiso `vehicles.read`. Si se envia `?plate=`, devuelve un
        sobre con un solo elemento (el vehiculo con esa placa) o 404 si no
        existe. La placa se normaliza (trim + upper) antes de buscar.
      parameters:
        - in: query
          name: plate
          required: false
          schema:
            type: string
            description: Placa Colombiana (ABC123 o ABC12A) — sera normalizada.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVehiclesResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [vehicles]
      summary: Crea un vehiculo nuevo
      description: |
        Requiere permiso `vehicles.write`. La placa se normaliza (trim +
        upper) y se valida contra el formato Colombiano (ABC123 o ABC12A).
        Si la placa ya existe, responde 409.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVehicleRequest' }
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Vehicle' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /vehicles/{id}:
    parameters:
      - $ref: '#/components/parameters/VehicleID'
    get:
      tags: [vehicles]
      summary: Obtiene un vehiculo por id
      description: Requiere permiso `vehicles.read`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Vehicle' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /units/{unitID}/vehicles:
    parameters:
      - $ref: '#/components/parameters/UnitID'
    get:
      tags: [assignments]
      summary: Lista vehiculos asignados a una unidad
      description: |
        Requiere permiso `vehicles.read`. Devuelve solo asignaciones activas
        (sin `until_date`). Cada item incluye el vehiculo materializado.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListAssignmentsResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [assignments]
      summary: Asigna un vehiculo a una unidad
      description: |
        Requiere permiso `vehicles.assign`. Un vehiculo solo puede estar
        asignado a una sola unidad activa a la vez; intentar reasignar un
        vehiculo ya asignado responde 409.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignVehicleRequest' }
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Assignment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /units/{unitID}/vehicles/{assignmentID}:
    parameters:
      - $ref: '#/components/parameters/UnitID'
      - $ref: '#/components/parameters/AssignmentID'
    delete:
      tags: [assignments]
      summary: Cierra (end) una asignacion de vehiculo
      description: |
        Requiere permiso `vehicles.assign`. Marca `until_date = today` para
        cerrar la asignacion. NO elimina la fila (la historia se conserva).
      responses:
        '204': { description: Assignment ended }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  parameters:
    VehicleID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    UnitID:
      in: path
      name: unitID
      required: true
      schema:
        type: string
        format: uuid
    AssignmentID:
      in: path
      name: assignmentID
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Vehicle:
      type: object
      required: [id, plate, type, status, created_at, updated_at, version]
      properties:
        id: { type: string, format: uuid }
        plate:
          type: string
          pattern: '^[A-Z]{3}(?:[0-9]{3}|[0-9]{2}[A-Z])$'
          description: Placa Colombiana normalizada (ABC123 o ABC12A).
        type:
          type: string
          enum: [car, motorcycle, truck, bicycle, other]
        brand: { type: string, nullable: true }
        model: { type: string, nullable: true }
        color: { type: string, nullable: true }
        year:
          type: integer
          format: int32
          minimum: 1950
          maximum: 2100
          nullable: true
        status:
          type: string
          enum: [active, inactive, archived]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        version: { type: integer, format: int32 }

    CreateVehicleRequest:
      type: object
      required: [plate, type]
      properties:
        plate:
          type: string
          description: Se normaliza (trim + upper) y se valida contra ABC123 / ABC12A.
        type:
          type: string
          enum: [car, motorcycle, truck, bicycle, other]
        brand: { type: string, nullable: true }
        model: { type: string, nullable: true }
        color: { type: string, nullable: true }
        year:
          type: integer
          format: int32
          minimum: 1950
          maximum: 2100
          nullable: true

    ListVehiclesResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Vehicle' }
        total: { type: integer }

    Assignment:
      type: object
      required: [id, unit_id, vehicle_id, since_date, status, created_at, updated_at, version]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        vehicle_id: { type: string, format: uuid }
        since_date: { type: string, format: date-time }
        until_date: { type: string, format: date-time, nullable: true }
        status:
          type: string
          enum: [active, inactive, archived]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        version: { type: integer, format: int32 }
        vehicle:
          $ref: '#/components/schemas/Vehicle'

    AssignVehicleRequest:
      type: object
      required: [vehicle_id]
      properties:
        vehicle_id: { type: string, format: uuid }
        since_date:
          type: string
          format: date-time
          description: Opcional; si se omite el servidor usa CURRENT_DATE.
          nullable: true

    ListAssignmentsResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Assignment' }
        total: { type: integer }

    Problem:
      description: RFC 7807 Problem Details object.
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }

  responses:
    BadRequest:
      description: Validation error.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unauthorized:
      description: Auth required.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Forbidden:
      description: Permiso insuficiente.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Recurso inexistente o archivado.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: Restriccion de unicidad / asignacion duplicada.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
