version: "2"
sql:
  - name: identity
    engine: postgresql
    queries: internal/modules/identity/infrastructure/persistence/queries
    schema: ../../migrations/tenant
    gen:
      go:
        package: identitydb
        out: internal/modules/identity/infrastructure/persistence/sqlcgen
        sql_package: pgx/v5
        emit_interface: true
        emit_empty_slices: true
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
        rename:
          mfa: MFA
